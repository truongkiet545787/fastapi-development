version: '3.8'

services:
  # 1. Cơ sở dữ liệu PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: fastapi-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password # Mật khẩu bạn muốn cấu hình cho DB
      POSTGRES_DB: fastapi
    ports:
      - "5432:5432" # Ánh xạ cổng ra ngoài để kết nối với pgAdmin trên Windows
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data # Lưu dữ liệu để không bị mất khi tắt container
    restart: always

  # 2. Ứng dụng FastAPI
  api:
    build: . # Tự động tìm và chạy Dockerfile ở thư mục hiện tại để build
    container_name: fastapi-app-dev
    ports:
      - "8000:8000" # Mở cổng 8000 ra ngoài để test API
    environment:
      DATABASE_HOSTNAME: db # Kết nối trực tiếp tới container "db" ở trên
      DATABASE_PORT: 5432
      DATABASE_PASSWORD: your_secure_password
      DATABASE_NAME: fastapi
      DATABASE_USERNAME: postgres
    volumes:
      - .:/code # Đồng bộ code nóng từ máy thật vào container để tự động tải lại khi sửa code (Hot Reload)
    depends_on:
      - db # Đảm bảo DB được bật lên trước
    restart: always

volumes:
  postgres_data_dev:
